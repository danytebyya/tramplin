name: Deploy to Yandex Cloud

on:
  push:
    branches:
      - dev

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            cd /var/www/tramplin
            rm -f frontend/tsconfig.tsbuildinfo
            git fetch origin dev
            git reset --hard origin/dev
            git clean -fd

            cd /var/www/tramplin/backend
            source .venv/bin/activate

            export DATABASE_URL="$(python -c "from dotenv import dotenv_values; print(dotenv_values('/var/www/tramplin/backend/.env')['DATABASE_URL'])")"

            echo "Using DATABASE_URL:"
            echo "$DATABASE_URL" | sed 's#://[^:]*:[^@]*@#://***:***@#'

            pip install -r requirements.txt

            echo "Alembic before upgrade:"
            alembic current
            alembic heads

            alembic upgrade head

            echo "Alembic after upgrade:"
            alembic current

            cd /var/www/tramplin/frontend
            npm install
            npm run build

            sudo systemctl restart tramplin-backend
            for attempt in $(seq 1 30); do
              if ! sudo systemctl is-active --quiet tramplin-backend; then
                sleep 2
                continue
              fi

              if curl -fsS http://127.0.0.1:8000/api/v1/platform/stats > /dev/null; then
                break
              fi

              if [ "$attempt" -eq 30 ]; then
                echo "tramplin-backend failed readiness check after restart"
                sudo systemctl status tramplin-backend --no-pager || true
                sudo journalctl -u tramplin-backend -n 200 --no-pager || true
                exit 1
              fi

              sleep 2
            done

            sudo systemctl reload nginx
