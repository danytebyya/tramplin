name: Deploy to Yandex Cloud

on:
  push:
    branches:
      - dev

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            cd /var/www/tramplin
            rm -f frontend/tsconfig.tsbuildinfo
            git fetch origin dev
            git reset --hard origin/dev
            git clean -fd

            cd /var/www/tramplin/backend
            source .venv/bin/activate

            set -a
            source /var/www/tramplin/backend/.env
            set +a

            echo "Using DATABASE_URL:"
            echo "$DATABASE_URL" | sed 's#://[^:]*:[^@]*@#://***:***@#'

            pip install -r requirements.txt

            echo "Alembic before upgrade:"
            alembic current
            alembic heads

            alembic upgrade head

            echo "Alembic after upgrade:"
            alembic current

            cd /var/www/tramplin/frontend
            npm install
            npm run build

            sudo systemctl restart tramplin-backend
            sleep 3

            curl -f http://127.0.0.1:8000/api/v1/platform/stats > /dev/null

            sudo systemctl reload nginx
